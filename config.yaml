llm:
  provider: "deepseek"
  model: "deepseek-chat"
  api_key: ""  # Loaded from DEEPSEEK_API_KEY env var
  temperature: 0.3
  max_tokens: 1024

compliance:
  valid_hours: [0, 23]
  max_call_per_hour: 3
  min_call_interval_minutes: 10

quota:
  call_self_daily_max: 10
  call_contact_daily_max: 10
  call_answer_daily_max: 3
  chat_unanswered_daily_max: 5
  chat_answered_daily_max: 100
  push_daily_max: 1

storage:
  db_path: "collect_agent.db"
