<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collect Agent Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .message-inbound { background: #f3f4f6; }
    .message-outbound { background: #dbeafe; }
    .thinking-box { font-family: monospace; font-size: 12px; }
  </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
  <header class="bg-slate-800 text-white p-4">
    <h1 class="text-xl font-bold">>Collect Agent Simulator</h1>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Left: Config Panel -->
    <aside class="w-80 bg-white border-r p-4 overflow-y-auto">
      <h2 class="font-bold mb-3 text-lg">用户配置</h2>
      <form id="configForm" class="space-y-3">
        <div>
          <label class="block text-sm text-gray-600">用户ID</label>
          <input type="text" id="cfgUserId" value="test_001" class="w-full border rounded p-2 text-sm">
        </div>
        <div>
          <label class="block text-sm text-gray-600">姓名</label>
          <input type="text" id="cfgName" value="张三" class="w-full border rounded p-2 text-sm">
        </div>
        <div>
          <label class="block text-sm text-gray-600">逾期天数</label>
          <input type="number" id="cfgOverdue" value="5" class="w-full border rounded p-2 text-sm">
        </div>
        <div>
          <label class="block text-sm text-gray-600">金额</label>
          <input type="number" id="cfgAmount" value="1000" class="w-full border rounded p-2 text-sm">
        </div>
        <div>
          <label class="block text-sm text-gray-600">职业</label>
          <input type="text" id="cfgOccupation" placeholder="律师/警察/记者..." class="w-full border rounded p-2 text-sm">
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white rounded p-2 text-sm hover:bg-blue-700">
          创建用户
        </button>
      </form>

      <hr class="my-4">

      <h2 class="font-bold mb-3 text-lg">手动触发事件</h2>
      <div class="space-y-2">
        <button onclick="triggerOutreach()" class="w-full bg-orange-500 text-white rounded p-2 text-sm hover:bg-orange-600">
          📞 触发催收 (SCHEDULED_OUTREACH)
        </button>
        <button onclick="triggerPayment()" class="w-full bg-green-500 text-white rounded p-2 text-sm hover:bg-green-600">
          💰 模拟支付 (USER_PAYMENT_SUCCESS)
        </button>
        <button onclick="triggerSilence()" class="w-full bg-gray-500 text-white rounded p-2 text-sm hover:bg-gray-600">
          ⏰ 静默超时 (SILENCE_TIMEOUT)
        </button>
      </div>
    </aside>

    <!-- Center: Chat Panel -->
    <main class="flex-1 flex flex-col bg-white">
      <div class="border-b p-3 bg-gray-50 flex justify-between items-center">
        <div>
          <span class="font-bold">对话: </span>
          <span id="currentUserId" class="text-blue-600">test_001</span>
        </div>
        <div id="connectionStatus" class="text-sm text-gray-400">未连接</div>
      </div>

      <div id="chatHistory" class="flex-1 overflow-y-auto p-4 space-y-3">
        <div class="text-center text-gray-400 text-sm py-8">请先创建用户，然后开始对话</div>
      </div>

      <div class="border-t p-3 flex gap-2">
        <input type="text" id="userInput" placeholder="输入用户消息..."
          class="flex-1 border rounded p-2 text-sm"
          onkeydown="if(event.key==='Enter') sendUserMessage()">
        <button onclick="sendUserMessage()" class="bg-blue-600 text-white rounded px-4 py-2 text-sm hover:bg-blue-700">
          发送
        </button>
      </div>
    </main>

    <!-- Right: Debug Panel -->
    <aside class="w-80 bg-gray-50 border-l p-4 overflow-y-auto">
      <h2 class="font-bold mb-3 text-lg">调试信息</h2>

      <div class="space-y-3 text-sm">
        <div class="bg-white rounded p-3 border">
          <div class="text-gray-500 text-xs mb-1">会话状态</div>
          <div id="debugState" class="font-mono font-bold text-blue-600">normal</div>
        </div>

        <div class="bg-white rounded p-3 border">
          <div class="text-gray-500 text-xs mb-1">当前意图</div>
          <div id="debugIntent" class="font-mono">-</div>
        </div>

        <div class="bg-white rounded p-3 border">
          <div class="text-gray-500 text-xs mb-1">协商轮数</div>
          <div id="debugRound" class="font-mono">0</div>
        </div>

        <div class="bg-white rounded p-3 border">
          <div class="text-gray-500 text-xs mb-1">LLM Thinking</div>
          <div id="debugThinking" class="thinking-box text-gray-600 max-h-40 overflow-y-auto">
            等待事件...
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    let ws = null;
    let currentUserId = 'test_001';

    function connectWebSocket(userId) {
      currentUserId = userId;
      document.getElementById('currentUserId').textContent = userId;

      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws/${userId}`;

      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        document.getElementById('connectionStatus').textContent = '✅ 已连接';
        document.getElementById('connectionStatus').className = 'text-sm text-green-600';
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleAgentResponse(data);
      };

      ws.onclose = () => {
        document.getElementById('connectionStatus').textContent = '❌ 已断开';
        document.getElementById('connectionStatus').className = 'text-sm text-red-400';
      };
    }

    function handleAgentResponse(data) {
      // Update chat
      if (data.response_text) {
        addMessage('outbound', data.response_text);
      }

      // Update debug panel
      document.getElementById('debugState').textContent = data.session_state || 'normal';
      document.getElementById('debugIntent').textContent = data.intent || '-';
      document.getElementById('debugRound').textContent = data.negotiation_round || '0';
      document.getElementById('debugThinking').textContent = data.thinking || '无';
    }

    function addMessage(direction, content) {
      const chat = document.getElementById('chatHistory');
      const div = document.createElement('div');
      div.className = `p-3 rounded-lg max-w-[80%] ${direction === 'inbound' ? 'message-inbound ml-auto' : 'message-outbound'}`;

      const icon = direction === 'inbound' ? '὆4 用户' : 'ᾑ6 Agent';
      div.innerHTML = `
        <div class="text-xs text-gray-500 mb-1">${icon} · ${new Date().toLocaleTimeString()}</div>
        <div class="text-sm">${escapeHtml(content)}</div>
      `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function sendUserMessage() {
      const input = document.getElementById('userInput');
      const msg = input.value.trim();
      if (!msg) return;

      addMessage('inbound', msg);
      input.value = '';

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          event_type: 'USER_REPLIED',
          payload: { message: msg }
        }));
      } else {
        // Fallback to HTTP
        const resp = await fetch('/api/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: currentUserId,
            event_type: 'USER_REPLIED',
            payload: { message: msg }
          })
        });
        const data = await resp.json();
        handleAgentResponse(data);
      }
    }

    function triggerOutreach() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ event_type: 'SCHEDULED_OUTREACH', payload: {} }));
      }
    }

    function triggerPayment() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ event_type: 'USER_PAYMENT_SUCCESS', payload: { amount: 1000 } }));
      }
    }

    function triggerSilence() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ event_type: 'SILENCE_TIMEOUT', payload: { tier: 0, seconds: 600 } }));
      }
    }

    document.getElementById('configForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userId = document.getElementById('cfgUserId').value;

      const resp = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          user_id: userId,
          name: document.getElementById('cfgName').value,
          overdue_days: parseInt(document.getElementById('cfgOverdue').value),
          amount_due: parseFloat(document.getElementById('cfgAmount').value),
          occupation: document.getElementById('cfgOccupation').value || null,
        })
      });

      if (resp.ok) {
        document.getElementById('chatHistory').innerHTML = '';
        connectWebSocket(userId);
        addMessage('outbound', `用户 ${userId} 已创建成功，可以开始对话`);
      }
    });

    // Auto-connect on load if user exists
    connectWebSocket('test_001');
  </script>
</body>
</html>
